name: PR (webitel-webrtc-rec)
run-name: "webitel-webrtc-rec@pr${{ github.event.pull_request.number }}#${{ github.run_number }} - ${{ github.event.pull_request.title }}"

on:
  pull_request:

permissions: { contents: read }
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    uses: webitel/reusable-workflows/.github/workflows/golang-prepare.yml@v2
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    with:
      development-branch: ${{ github.event.repository.default_branch }}
      triggered-branch: ${{ github.event.pull_request.base.ref }}

  checks:
    name: Checks
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/golang-checks.yml@v2
    permissions:
      contents: read
      actions: read
      security-events: write

    with:
      changes: ${{ needs.prepare.outputs.changes }}

  compile:
    name: Build
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/golang-build.yml@v2
    with:
      binary-name: webitel-webrtc-rec
      ldflags: >
        -s -w
        

      version: ${{ needs.prepare.outputs.version }}
      version-build: ${{ github.run_number }}
      prerelease: dev~pr${{ github.event.pull_request.number }}
      package-name: webitel-webrtc-rec
      package-description: ${{ github.event.repository.description }}
      package-contents: |
        src=deploy/systemd/webitel-webrtc-rec.service dst=/etc/systemd/system/webitel-webrtc-rec.service type=config
        src=.env.example dst=/etc/default/webitel-webrtc-rec type=config mode=0640
        

      scripts: |
        postinstall: deploy/debian/postinst.sh
        preremove: deploy/debian/prerm.sh
        postremove: deploy/debian/postrm.sh
        
